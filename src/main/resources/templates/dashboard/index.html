<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Dashboard', ~{::content})">
    <div th:fragment="content">
        <section class="page-card hero">
            <div class="hero__panel">
                <h2>Xin chào, quản trị viên</h2>
                <p>Đây là trang dashboard tổng quan của hệ thống. Từ sidebar bên trái, bạn có thể truy cập các module quản trị, bán hàng, menu, kho và báo cáo theo đúng vai trò.</p>
            </div>
            <div class="mini-grid">
                <div class="stat">
                    <p class="stat__label">Trạng thái hệ thống</p>
                    <p class="stat__value">Sẵn sàng</p>
                </div>
                <div class="stat">
                    <p class="stat__label">Phân quyền</p>
                    <p class="stat__value">Cố định</p>
                </div>
                <div class="stat">
                    <p class="stat__label">Công nghệ</p>
                    <p class="stat__value">Spring Boot</p>
                </div>
                <div class="stat">
                    <p class="stat__label">CSDL</p>
                    <p class="stat__value">MySQL</p>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
