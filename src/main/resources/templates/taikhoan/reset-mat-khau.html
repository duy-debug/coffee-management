<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Reset mật khẩu', ~{::content})">
    <div th:fragment="content">
        <section class="page-card form-card">
            <div class="page-head">
                <div>
                    <h2 class="section-title">Reset mật khẩu</h2>
                    <p class="section-subtitle">Mật khẩu mới sẽ được mã hóa bằng BCrypt.</p>
                </div>
                <a th:href="@{/tai-khoan}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="page-card" style="margin-bottom: 18px;">
                <p class="placeholder-text"><strong>Tài khoản:</strong> <span th:text="${taiKhoanForm.tenDangNhap}"></span></p>
                <p class="placeholder-text"><strong>Nhân viên:</strong> <span th:text="${taiKhoanForm.tenNhanVien}"></span></p>
                <p class="placeholder-text"><strong>Vai trò:</strong> <span th:text="${taiKhoanForm.tenVaiTro}"></span></p>
            </div>

            <form th:action="@{${formAction}}" th:object="${resetMatKhau}" method="post" class="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Mật khẩu mới</label>
                        <input type="password" class="form-control" th:field="*{matKhauMoi}" placeholder="Nhập mật khẩu mới">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Xác nhận mật khẩu mới</label>
                        <input type="password" class="form-control" th:field="*{xacNhanMatKhauMoi}" placeholder="Nhập lại mật khẩu mới">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Reset mật khẩu</button>
                    <a th:href="@{/tai-khoan}" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</div>
</body>
</html>
