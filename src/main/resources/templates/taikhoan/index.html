<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Quản lý tài khoản', ~{::content})">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Quản lý tài khoản</h2>
                    <p class="section-subtitle">Tạo, chỉnh sửa, khóa/mở và reset mật khẩu tài khoản.</p>
                </div>
                <a th:href="@{/tai-khoan/them}" class="btn-primary">Tạo tài khoản</a>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form class="search-form" method="get" th:action="@{/tai-khoan}">
                <div class="form-group">
                    <label class="form-label">Từ khóa</label>
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Mã, username, họ tên nhân viên">
                </div>
                <div class="form-group">
                    <label class="form-label">Trạng thái</label>
                    <select name="trangThai" class="form-control">
                        <option value="" th:selected="${trangThaiLoc == null || trangThaiLoc == ''}">Tất cả</option>
                        <option value="true" th:selected="${trangThaiLoc == 'true'}">Hoạt động</option>
                        <option value="false" th:selected="${trangThaiLoc == 'false'}">Bị khóa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Vai trò</label>
                    <select name="vaiTro" class="form-control">
                        <option value="" th:selected="${vaiTroLoc == null || vaiTroLoc == ''}">Tất cả</option>
                        <option value="ROLE_ADMIN" th:selected="${vaiTroLoc == 'ROLE_ADMIN'}">ROLE_ADMIN</option>
                        <option value="ROLE_NHANVIEN" th:selected="${vaiTroLoc == 'ROLE_NHANVIEN'}">ROLE_NHANVIEN</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary btn-small">Tìm kiếm</button>
                <a th:href="@{/tai-khoan}" class="btn-secondary btn-small">Làm mới</a>
            </form>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Mã TK</th>
                        <th>Tên đăng nhập</th>
                        <th>Vai trò</th>
                        <th>Nhân viên</th>
                        <th>Chức vụ</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(danhSachTaiKhoan)}">
                        <td colspan="7">Chưa có tài khoản nào.</td>
                    </tr>
                    <tr th:each="taiKhoan : ${danhSachTaiKhoan}">
                        <td th:text="${taiKhoan.maTaiKhoan}"></td>
                        <td th:text="${taiKhoan.tenDangNhap}"></td>
                        <td th:text="${taiKhoan.tenVaiTro}"></td>
                        <td th:text="${taiKhoan.hoTenNhanVien} ?: '---'"></td>
                        <td th:text="${taiKhoan.chucVuNhanVien} ?: '---'"></td>
                        <td>
                            <span class="badge-status"
                                  th:classappend="${taiKhoan.trangThai == 'Hoạt động'} ? ' badge-status--success' : ' badge-status--danger'"
                                  th:text="${taiKhoan.trangThai}"></span>
                        </td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{'/tai-khoan/sua/' + ${taiKhoan.maTaiKhoan}}" class="btn-secondary btn-small">Sửa</a>
                                <a th:href="@{'/tai-khoan/reset-mat-khau/' + ${taiKhoan.maTaiKhoan}}" class="btn-secondary btn-small">Reset MK</a>
                                <form th:if="${taiKhoan.trangThai == 'Hoạt động'}" th:action="@{'/tai-khoan/khoa/' + ${taiKhoan.maTaiKhoan}}" method="post">
                                    <button type="submit" class="btn-logout btn-small">Khóa</button>
                                </form>
                                <form th:if="${taiKhoan.trangThai == 'Bị khóa'}" th:action="@{'/tai-khoan/mo-khoa/' + ${taiKhoan.maTaiKhoan}}" method="post">
                                    <button type="submit" class="btn-primary btn-small">Mở khóa</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>
</body>
</html>
