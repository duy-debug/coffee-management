<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Tài khoản', ~{::content})">
    <div th:fragment="content">
        <section class="page-card form-card">
            <div class="page-head">
                <div>
                    <h2 class="section-title" th:text="${formMode == 'create' ? 'Tạo tài khoản' : 'Cập nhật tài khoản'}"></h2>
                    <p class="section-subtitle">Quản lý tài khoản đăng nhập của nhân viên.</p>
                </div>
                <a th:href="@{/tai-khoan}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{${formAction}}" th:object="${taiKhoanForm}" method="post" class="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Mã tài khoản</label>
                        <input type="text" class="form-control" th:field="*{maTaiKhoan}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" class="form-control" th:field="*{tenDangNhap}" placeholder="Nhập tên đăng nhập">
                    </div>
                    <div class="form-group" th:if="${formMode == 'create'}">
                        <label class="form-label">Mật khẩu ban đầu</label>
                        <input type="password" class="form-control" th:field="*{matKhau}" placeholder="Nhập mật khẩu ban đầu">
                    </div>
                    <div class="form-group" th:if="${formMode == 'create'}">
                        <label class="form-label">Vai trò</label>
                        <select class="form-control" th:field="*{tenVaiTro}">
                            <option th:each="vaiTro : ${danhSachVaiTro}" th:value="${vaiTro.tenVaiTro}" th:text="${vaiTro.tenVaiTro}"></option>
                        </select>
                    </div>
                    <div class="form-group" th:if="${formMode == 'edit'}">
                        <label class="form-label">Vai trò</label>
                        <select class="form-control" th:field="*{tenVaiTro}">
                            <option th:each="vaiTro : ${danhSachVaiTro}" th:value="${vaiTro.tenVaiTro}" th:text="${vaiTro.tenVaiTro}"></option>
                        </select>
                    </div>
                    <div class="form-group" th:if="${formMode == 'create'}">
                        <label class="form-label">Nhân viên</label>
                        <select class="form-control" th:field="*{maNhanVien}">
                            <option value="">-- Chọn nhân viên --</option>
                            <option th:each="nhanVien : ${danhSachNhanVien}" th:value="${nhanVien.maNhanVien}" th:text="${nhanVien.maNhanVien + ' - ' + nhanVien.hoTen}"></option>
                        </select>
                    </div>
                    <div class="form-group" th:if="${formMode == 'edit'}">
                        <label class="form-label">Nhân viên</label>
                        <input type="text" class="form-control" th:value="${taiKhoanForm.maNhanVien + ' - ' + taiKhoanForm.tenNhanVien}" readonly>
                    </div>
                    <div class="form-group form-group--full">
                        <label class="form-label">
                            <input type="checkbox" th:field="*{trangThai}">
                            Tài khoản hoạt động
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" th:text="${formMode == 'create' ? 'Tạo tài khoản' : 'Lưu thay đổi'}"></button>
                    <a th:href="@{/tai-khoan}" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</div>
</body>
</html>
