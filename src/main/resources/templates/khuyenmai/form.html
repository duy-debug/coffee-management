<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/main :: page(${formMode == 'create' ? 'Thêm khuyến mãi' : 'Sửa khuyến mãi'}, ~{::content})}">
    <div th:fragment="content">
        <section class="page-card form-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title" th:text="${formMode == 'create' ? 'Thêm khuyến mãi' : 'Sửa khuyến mãi'}"></h2>
                    <p class="section-subtitle">Thiết lập ưu đãi và thời gian hiệu lực cho chương trình khuyến mãi.</p>
                </div>
                <a th:href="@{/khuyen-mai}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{${formAction}}" method="post" class="profile-form" th:object="${khuyenMaiForm}">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Mã khuyến mãi</label>
                        <input type="text" class="form-control" th:field="*{maKhuyenMai}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tên khuyến mãi</label>
                        <input type="text" class="form-control" th:field="*{tenKhuyenMai}" placeholder="Nhập tên khuyến mãi" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Loại khuyến mãi</label>
                        <select class="form-control" th:field="*{loaiKhuyenMai}" required>
                            <option value="GIAM_TIEN">GIAM_TIEN</option>
                            <option value="GIAM_PHAN_TRAM">GIAM_PHAN_TRAM</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Giá trị giảm</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{giaTriGiam}" placeholder="Nhập giá trị giảm">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ngày bắt đầu</label>
                        <input type="datetime-local" class="form-control" th:field="*{ngayBatDau}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ngày kết thúc</label>
                        <input type="datetime-local" class="form-control" th:field="*{ngayKetThuc}">
                    </div>
                    <div class="form-group form-group--full">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-control" th:field="*{trangThai}">
                            <option value="true">Đang áp dụng</option>
                            <option value="false">Ngừng áp dụng</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions" style="margin-top: 18px;">
                    <button type="submit" class="btn-primary" th:text="${formMode == 'create' ? 'Thêm khuyến mãi' : 'Cập nhật khuyến mãi'}"></button>
                    <a th:href="@{/khuyen-mai}" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</div>
</body>
</html>
