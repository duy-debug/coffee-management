<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Bàn', ~{::content})">
    <div th:fragment="content">
        <section class="page-card form-card">
            <div class="page-head">
                <div>
                    <h2 class="section-title" th:text="${formMode == 'create' ? 'Thêm bàn' : 'Cập nhật bàn'}"></h2>
                    <p class="section-subtitle">Quản lý thông tin bàn và trạng thái sử dụng.</p>
                </div>
                <a th:href="@{/ban}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{${formAction}}" th:object="${banForm}" method="post" class="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Mã bàn</label>
                        <input type="text" class="form-control" th:field="*{maBan}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tên bàn</label>
                        <input type="text" class="form-control" th:field="*{tenBan}" placeholder="Nhập tên bàn">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Khu vực</label>
                        <input type="text" class="form-control" th:field="*{khuVuc}" placeholder="Nhập khu vực">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-control" th:field="*{trangThai}">
                            <option value="Trống">Trống</option>
                            <option value="Đang phục vụ">Đang phục vụ</option>
                            <option value="Chờ thanh toán">Chờ thanh toán</option>
                        </select>
                    </div>
                    <div class="form-group form-group--full">
                        <label class="form-label">Ghi chú</label>
                        <textarea class="form-control" th:field="*{ghiChu}" rows="4" placeholder="Nhập ghi chú"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" th:text="${formMode == 'create' ? 'Tạo bàn' : 'Lưu thay đổi'}"></button>
                    <a th:href="@{/ban}" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</div>
</body>
</html>
