<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Không có quyền truy cập</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2b1b12 0%, #6f3f21 55%, #d79a5b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 36px;
            max-width: 560px;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        }
        .box h1 {
            margin: 0 0 12px;
            font-size: 48px;
        }
        .box p {
            margin: 0 0 24px;
            font-size: 18px;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 700;
        }
        .btn-home {
            background: #f3c17a;
            color: #4b2b17;
        }
        .btn-login {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
<div class="box">
    <h1>403</h1>
    <p>Bạn không có quyền truy cập vào chức năng này.</p>
    <div class="actions">
        <a class="btn btn-home" th:href="@{/dashboard}">Về trang chủ</a>
        <a class="btn btn-login" th:href="@{/login}">Đăng nhập lại</a>
    </div>
</div>
</body>
</html>
