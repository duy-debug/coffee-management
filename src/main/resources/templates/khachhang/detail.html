<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/main :: page('Chi tiết khách hàng', ~{::content})}">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Chi tiết khách hàng</h2>
                    <p class="section-subtitle" th:text="${khachHangDetail.khachHang.maKhachHang}"></p>
                </div>
                <div class="invoice-actions">
                    <a th:href="@{'/khach-hang/sua/' + ${khachHangDetail.khachHang.maKhachHang}}" class="btn-primary">Sửa</a>
                    <a th:href="@{'/khach-hang/lich-su/' + ${khachHangDetail.khachHang.maKhachHang}}" class="btn-secondary">Xem lịch sử</a>
                    <a th:href="@{/khach-hang}" class="btn-secondary">Quay lại</a>
                </div>
            </div>

            <div class="content-card" style="margin-bottom: 18px;">
                <div class="invoice-meta-grid">
                    <div class="profile-card">
                        <p class="profile-card__label">Họ tên</p>
                        <div class="profile-card__value" th:text="${khachHangDetail.khachHang.hoTen}"></div>
                    </div>
                    <div class="profile-card">
                        <p class="profile-card__label">Số điện thoại</p>
                        <div class="profile-card__value" th:text="${khachHangDetail.khachHang.soDienThoai != null ? khachHangDetail.khachHang.soDienThoai : '---'}"></div>
                    </div>
                    <div class="profile-card">
                        <p class="profile-card__label">Tổng đơn hàng</p>
                        <div class="profile-card__value" th:text="${khachHangDetail.tongSoDonHang}"></div>
                    </div>
                    <div class="profile-card">
                        <p class="profile-card__label">Tổng hóa đơn</p>
                        <div class="profile-card__value" th:text="${khachHangDetail.tongSoHoaDon}"></div>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <div class="invoice-summary">
                    <div class="profile-card">
                        <p class="profile-card__label">Tổng tiền đã mua</p>
                        <div class="profile-card__value" th:text="|${#numbers.formatDecimal(khachHangDetail.tongTienDaMua, 0, 'COMMA', 0, 'POINT')} đ|"></div>
                    </div>
                    <div class="profile-card">
                        <p class="profile-card__label">Ghi chú</p>
                        <div class="profile-card__value" th:text="${khachHangDetail.khachHang.ghiChu != null ? khachHangDetail.khachHang.ghiChu : '---'}"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
