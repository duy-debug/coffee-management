<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/main :: page(${formMode == 'create' ? 'Thêm khách hàng' : 'Sửa khách hàng'}, ~{::content})}">
    <div th:fragment="content">
        <section class="page-card form-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title" th:text="${formMode == 'create' ? 'Thêm khách hàng' : 'Sửa khách hàng'}"></h2>
                    <p class="section-subtitle">Cập nhật thông tin khách hàng phục vụ bán hàng và lịch sử mua hàng.</p>
                </div>
                <a th:href="@{/khach-hang}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{${formAction}}" method="post" class="profile-form" th:object="${khachHangForm}">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Mã khách hàng</label>
                        <input type="text" class="form-control" th:field="*{maKhachHang}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Họ tên</label>
                        <input type="text" class="form-control" th:field="*{hoTen}" placeholder="Nhập họ tên khách hàng" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{soDienThoai}" placeholder="Có thể để trống">
                    </div>
                    <div class="form-group form-group--full">
                        <label class="form-label">Ghi chú</label>
                        <textarea class="form-control" th:field="*{ghiChu}" rows="4" placeholder="Ghi chú thêm về khách hàng"></textarea>
                    </div>
                </div>
                <div class="form-actions" style="margin-top: 18px;">
                    <button type="submit" class="btn-primary" th:text="${formMode == 'create' ? 'Thêm khách hàng' : 'Cập nhật khách hàng'}"></button>
                    <a th:href="@{/khach-hang}" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</div>
</body>
</html>
