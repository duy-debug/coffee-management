<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout/main :: page('Menu / Tra cứu món', ~{::content})}">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Menu / Tra cứu món</h2>
                    <p class="section-subtitle">Danh sách món đang bán cho cả Admin và Nhân viên.</p>
                </div>
                <a th:href="@{/mon}" class="btn-secondary" sec:authorize="hasAuthority('ROLE_ADMIN')">Vào quản trị món</a>
            </div>

            <form class="search-form" method="get" th:action="@{/menu}">
                <div class="form-group">
                    <label class="form-label">Từ khóa</label>
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Mã hoặc tên món">
                </div>
                <div class="form-group">
                    <label class="form-label">Nhóm món</label>
                    <select class="form-control" name="maNhomMon">
                        <option value="" th:selected="${maNhomMonLoc == null || maNhomMonLoc == ''}">Tất cả</option>
                        <option th:each="nhomMon : ${danhSachNhomMon}" th:value="${nhomMon.maNhomMon}" th:text="${nhomMon.tenNhomMon}" th:selected="${maNhomMonLoc == nhomMon.maNhomMon}"></option>
                    </select>
                </div>
                <button type="submit" class="btn-primary btn-small">Tìm kiếm</button>
                <a th:href="@{/menu}" class="btn-secondary btn-small">Làm mới</a>
            </form>

            <div class="menu-grid">
                <article class="menu-card" th:if="${#lists.isEmpty(danhSachMon)}">
                    <h3>Chưa có món đang bán</h3>
                    <p>Vui lòng kiểm tra lại dữ liệu hoặc bộ lọc hiện tại.</p>
                </article>

                <article class="menu-card" th:each="mon : ${danhSachMon}">
                    <div class="menu-card__image" th:if="${mon.hinhAnh != null and mon.hinhAnh != ''}">
                        <img th:src="@{'/uploads/mon/' + ${mon.hinhAnh}}" alt="Ảnh món">
                    </div>
                    <div class="menu-card__image menu-card__image--empty" th:if="${mon.hinhAnh == null or mon.hinhAnh == ''}">
                        <span>Chưa có ảnh</span>
                    </div>
                    <div class="menu-card__header">
                        <div>
                            <h3 th:text="${mon.tenMon}"></h3>
                            <p class="menu-card__meta" th:text="${mon.nhomMon != null ? mon.nhomMon.tenNhomMon : 'Chưa có nhóm'}"></p>
                        </div>
                        <div class="menu-card__price" th:text="|${#numbers.formatDecimal(mon.donGia, 0, 'COMMA', 0, 'POINT')} đ|"></div>
                    </div>
                    <p class="menu-card__desc" th:text="${mon.moTa} ?: 'Chưa có mô tả'"></p>
                    <div class="menu-card__footer">
                        <span class="badge-status badge-status--success">Đang bán</span>
                        <span class="menu-card__code" th:text="${mon.maMon}"></span>
                    </div>
                </article>
            </div>
        </section>
    </div>
</div>
</body>
</html>
