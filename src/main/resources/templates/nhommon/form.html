<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Nhóm món', ~{::content})">
    <div th:fragment="content">
        <section class="page-card form-card">
            <div class="page-head">
                <div>
                    <h2 class="section-title" th:text="${formMode == 'create' ? 'Thêm nhóm món' : 'Cập nhật nhóm món'}"></h2>
                    <p class="section-subtitle">Chỉnh sửa thông tin nhóm món đang sử dụng trong menu.</p>
                </div>
                <a th:href="@{/nhom-mon}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{${formAction}}" th:object="${nhomMonForm}" method="post" class="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Mã nhóm món</label>
                        <input type="text" class="form-control" th:field="*{maNhomMon}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tên nhóm món</label>
                        <input type="text" class="form-control" th:field="*{tenNhomMon}" placeholder="Nhập tên nhóm món">
                    </div>
                    <div class="form-group form-group--full">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" th:field="*{moTa}" rows="4" placeholder="Nhập mô tả nhóm món"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" th:text="${formMode == 'create' ? 'Tạo nhóm món' : 'Lưu thay đổi'}"></button>
                    <a th:href="@{/nhom-mon}" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</div>
</body>
</html>
