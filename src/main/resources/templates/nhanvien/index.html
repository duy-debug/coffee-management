<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Quản lý nhân viên', ~{::content})">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Quản lý nhân viên</h2>
                    <p class="section-subtitle">Danh sách nhân viên trong hệ thống.</p>
                </div>
                <a th:href="@{/nhan-vien/them}" class="btn-primary">Thêm nhân viên</a>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form class="search-form" method="get" th:action="@{/nhan-vien}">
                <div class="form-group">
                    <label class="form-label">Từ khóa</label>
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Mã, họ tên, số điện thoại">
                </div>
                <div class="form-group">
                    <label class="form-label">Trạng thái</label>
                    <select name="trangThai" class="form-control">
                        <option value="" th:selected="${trangThaiLoc == null || trangThaiLoc == ''}">Tất cả</option>
                        <option value="true" th:selected="${trangThaiLoc == 'true'}">Đang làm</option>
                        <option value="false" th:selected="${trangThaiLoc == 'false'}">Ngừng làm</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary btn-small">Tìm kiếm</button>
                <a th:href="@{/nhan-vien}" class="btn-secondary btn-small">Làm mới</a>
            </form>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Mã NV</th>
                        <th>Họ tên</th>
                        <th>Số điện thoại</th>
                        <th>Địa chỉ</th>
                        <th>Chức vụ</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(danhSachNhanVien)}">
                        <td colspan="7">Chưa có nhân viên nào.</td>
                    </tr>
                    <tr th:each="nhanVien : ${danhSachNhanVien}">
                        <td th:text="${nhanVien.maNhanVien}"></td>
                        <td th:text="${nhanVien.hoTen}"></td>
                        <td th:text="${nhanVien.soDienThoai}"></td>
                        <td th:text="${nhanVien.diaChi} ?: '---'"></td>
                        <td th:text="${nhanVien.chucVu}"></td>
                        <td>
                            <span class="badge-status"
                                  th:classappend="${nhanVien.trangThai} ? ' badge-status--success' : ' badge-status--danger'"
                                  th:text="${nhanVien.trangThai} ? 'Đang làm' : 'Ngừng làm'"></span>
                        </td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{'/nhan-vien/sua/' + ${nhanVien.maNhanVien}}" class="btn-secondary btn-small">Sửa</a>
                                <form th:if="${nhanVien.trangThai}" th:action="@{'/nhan-vien/ngung/' + ${nhanVien.maNhanVien}}" method="post">
                                    <button type="submit" class="btn-logout btn-small">Ngừng</button>
                                </form>
                                <form th:if="${!nhanVien.trangThai}" th:action="@{'/nhan-vien/kich-hoat/' + ${nhanVien.maNhanVien}}" method="post">
                                    <button type="submit" class="btn-primary btn-small">Kích hoạt</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>
</body>
</html>
