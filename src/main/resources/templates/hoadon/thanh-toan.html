<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/main :: page('Thanh toán hóa đơn', ~{::content})}">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Thanh toán hóa đơn</h2>
                    <p class="section-subtitle" th:text="|Đơn hàng ${thanhToanView.donHang.maDonHang} • ${thanhToanView.donHang.trangThai}|"></p>
                </div>
                <a th:href="@{/hoa-don}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="payment-grid">
                <div class="content-card">
                    <div class="invoice-meta-grid">
                        <div class="profile-card">
                            <p class="profile-card__label">Mã đơn</p>
                            <div class="profile-card__value" th:text="${thanhToanView.donHang.maDonHang}"></div>
                        </div>
                        <div class="profile-card">
                            <p class="profile-card__label">Loại đơn</p>
                            <div class="profile-card__value" th:text="${thanhToanView.donHang.loaiDonHang}"></div>
                        </div>
                        <div class="profile-card">
                            <p class="profile-card__label">Bàn</p>
                            <div class="profile-card__value" th:text="${thanhToanView.donHang.ban != null ? thanhToanView.donHang.ban.tenBan : '---'}"></div>
                        </div>
                        <div class="profile-card">
                            <p class="profile-card__label">Khách hàng</p>
                            <div class="profile-card__value" th:text="${thanhToanView.donHang.khachHang != null ? thanhToanView.donHang.khachHang.hoTen : '---'}"></div>
                        </div>
                    </div>

                    <div class="table-wrap" style="margin-top: 18px;">
                        <table class="data-table">
                            <thead>
                            <tr>
                                <th>Mã món</th>
                                <th>Tên món</th>
                                <th>Số lượng</th>
                                <th>Đơn giá</th>
                                <th>Thành tiền</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${thanhToanView.chiTietDonHangs}">
                                <td th:text="${item.mon != null ? item.mon.maMon : '---'}"></td>
                                <td th:text="${item.mon != null ? item.mon.tenMon : '---'}"></td>
                                <td th:text="${item.soLuong}"></td>
                                <td th:text="|${#numbers.formatDecimal(item.donGia, 0, 'COMMA', 0, 'POINT')} đ|"></td>
                                <td th:text="|${#numbers.formatDecimal(item.thanhTien, 0, 'COMMA', 0, 'POINT')} đ|"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="content-card">
                    <form th:action="@{'/hoa-don/thanh-toan/' + ${thanhToanView.donHang.maDonHang}}" method="post" class="banhang-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="form-group">
                            <label class="form-label">Phương thức thanh toán</label>
                            <select class="form-control" name="phuongThucThanhToan" required>
                                <option value="Tiền mặt" th:selected="${thanhToanView.phuongThucThanhToan == 'Tiền mặt'}">Tiền mặt</option>
                                <option value="Chuyển khoản" th:selected="${thanhToanView.phuongThucThanhToan == 'Chuyển khoản'}">Chuyển khoản</option>
                                <option value="Ví điện tử" th:selected="${thanhToanView.phuongThucThanhToan == 'Ví điện tử'}">Ví điện tử</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Khuyến mãi</label>
                            <select class="form-control" name="maKhuyenMai">
                                <option value="" th:selected="${thanhToanView.maKhuyenMai == null || thanhToanView.maKhuyenMai == ''}">Không áp dụng</option>
                                <option th:each="khuyenMai : ${thanhToanView.danhSachKhuyenMai}"
                                        th:value="${khuyenMai.maKhuyenMai}"
                                        th:text="|${khuyenMai.maKhuyenMai} - ${khuyenMai.tenKhuyenMai} (${khuyenMai.loaiKhuyenMai})|"
                                        th:selected="${thanhToanView.maKhuyenMai == khuyenMai.maKhuyenMai}"></option>
                            </select>
                        </div>

                        <div class="invoice-summary">
                            <div class="profile-card">
                                <p class="profile-card__label">Tổng tiền</p>
                                <div class="profile-card__value" th:text="|${#numbers.formatDecimal(thanhToanView.tongTien, 0, 'COMMA', 0, 'POINT')} đ|"></div>
                            </div>
                            <div class="profile-card">
                                <p class="profile-card__label">Số tiền giảm</p>
                                <div class="profile-card__value" th:text="|${#numbers.formatDecimal(thanhToanView.soTienGiam, 0, 'COMMA', 0, 'POINT')} đ|"></div>
                            </div>
                            <div class="profile-card">
                                <p class="profile-card__label">Phải trả</p>
                                <div class="profile-card__value" th:text="|${#numbers.formatDecimal(thanhToanView.soTienPhaiTra, 0, 'COMMA', 0, 'POINT')} đ|"></div>
                            </div>
                            <div class="profile-card">
                                <p class="profile-card__label">Trạng thái</p>
                                <div class="profile-card__value" th:text="${thanhToanView.donHang.trangThai}"></div>
                            </div>
                        </div>

                        <div class="invoice-actions" style="margin-top: 18px;">
                            <button type="submit" class="btn-primary">Xác nhận thanh toán</button>
                            <a th:href="@{'/don-hang/' + ${thanhToanView.donHang.maDonHang}}" class="btn-secondary">Xem đơn</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
