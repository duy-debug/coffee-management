<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout/main :: page('Đơn hàng', ~{::content})}">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Đơn hàng</h2>
                    <p class="section-subtitle">Danh sách đơn hàng, xem chi tiết và chỉnh sửa đơn chưa thanh toán.</p>
                </div>
                <a th:href="@{/ban-hang}" class="btn-primary">Tạo đơn mới</a>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="content-card" style="margin-bottom: 18px;">
                <form class="search-form" method="get" th:action="@{/don-hang}">
                    <div class="form-group">
                        <label class="form-label">Từ khóa</label>
                        <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Mã đơn, nhân viên, khách hàng, bàn">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-control" name="trangThai">
                            <option value="" th:selected="${trangThaiLoc == null || trangThaiLoc == ''}">Tất cả</option>
                            <option value="Đang xử lý" th:selected="${trangThaiLoc == 'Đang xử lý'}">Đang xử lý</option>
                            <option value="Đang phục vụ" th:selected="${trangThaiLoc == 'Đang phục vụ'}">Đang phục vụ</option>
                            <option value="Chờ thanh toán" th:selected="${trangThaiLoc == 'Chờ thanh toán'}">Chờ thanh toán</option>
                            <option value="Đã hủy" th:selected="${trangThaiLoc == 'Đã hủy'}">Đã hủy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Loại đơn</label>
                        <select class="form-control" name="loaiDonHang">
                            <option value="" th:selected="${loaiDonHangLoc == null || loaiDonHangLoc == ''}">Tất cả</option>
                            <option value="Dùng tại quán" th:selected="${loaiDonHangLoc == 'Dùng tại quán'}">Dùng tại quán</option>
                            <option value="Mang đi" th:selected="${loaiDonHangLoc == 'Mang đi'}">Mang đi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Từ ngày</label>
                        <input type="date" class="form-control" name="tuNgay" th:value="${tuNgay}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Đến ngày</label>
                        <input type="date" class="form-control" name="denNgay" th:value="${denNgay}">
                    </div>
                    <button type="submit" class="btn-primary btn-small">Lọc</button>
                    <a th:href="@{/don-hang}" class="btn-secondary btn-small">Làm mới</a>
                </form>
            </div>

            <div class="content-card">
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Mã đơn</th>
                            <th>Ngày đặt</th>
                            <th>Loại đơn</th>
                            <th>Trạng thái</th>
                            <th>Tổng tiền</th>
                            <th>Nhân viên</th>
                            <th>Khách hàng</th>
                            <th>Bàn</th>
                            <th class="order-actions-col">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSachDonHang)}">
                            <td colspan="9">Chưa có đơn hàng nào.</td>
                        </tr>
                        <tr th:each="donHang : ${danhSachDonHang}">
                            <td th:text="${donHang.maDonHang}"></td>
                            <td th:text="${#temporals.format(donHang.ngayDat, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${donHang.loaiDonHang}"></td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${donHang.trangThai == 'Đang phục vụ'} ? ' badge-status--warning' : (${donHang.trangThai == 'Chờ thanh toán'} ? ' badge-status--danger' : (${donHang.trangThai == 'Đã hủy'} ? ' badge-status--neutral' : ' badge-status--success'))"
                                      th:text="${donHang.trangThai}"></span>
                            </td>
                            <td th:text="|${#numbers.formatDecimal(donHang.tongTien, 0, 'COMMA', 0, 'POINT')} đ|"></td>
                            <td th:text="${donHang.nhanVien != null ? donHang.nhanVien.hoTen : '---'}"></td>
                            <td th:text="${donHang.khachHang != null ? donHang.khachHang.hoTen : '---'}"></td>
                            <td th:text="${donHang.ban != null ? donHang.ban.tenBan : '---'}"></td>
                            <td class="order-actions-col">
                                <div class="action-buttons">
                                    <a th:href="@{'/don-hang/' + ${donHang.maDonHang}}" class="btn-secondary btn-small">Xem</a>
                                    <a th:if="${donHang.trangThai != 'Đã thanh toán' && donHang.trangThai != 'Đã hủy'}"
                                       th:href="@{'/don-hang/sua/' + ${donHang.maDonHang}}"
                                       class="btn-primary btn-small">Sửa</a>
                                    <form th:if="${donHang.trangThai != 'Đã thanh toán' && donHang.trangThai != 'Đã hủy'}"
                                          th:action="@{'/don-hang/huy/' + ${donHang.maDonHang}}"
                                          method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn-logout btn-small">Hủy</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
