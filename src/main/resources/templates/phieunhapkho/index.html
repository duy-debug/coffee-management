<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/main :: page('Phiếu nhập kho', ~{::content})}">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Phiếu nhập kho</h2>
                    <p class="section-subtitle">Theo dõi các phiếu nhập và mở chi tiết từng lần nhập nguyên liệu.</p>
                </div>
                <a th:href="@{/phieu-nhap-kho/them}" class="btn-primary">Tạo phiếu nhập</a>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="content-card" style="margin-bottom: 18px;">
                <form class="search-form" method="get" th:action="@{/phieu-nhap-kho}">
                    <div class="form-group">
                        <label class="form-label">Từ khóa</label>
                        <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Mã phiếu, ghi chú, nhân viên">
                    </div>
                    <button type="submit" class="btn-primary btn-small">Lọc</button>
                    <a th:href="@{/phieu-nhap-kho}" class="btn-secondary btn-small">Làm mới</a>
                </form>
            </div>

            <div class="content-card">
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Mã phiếu</th>
                            <th>Ngày nhập</th>
                            <th>Nhân viên</th>
                            <th>Ghi chú</th>
                            <th>Tổng dòng</th>
                            <th>Tổng tiền</th>
                            <th class="order-actions-col">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSachPhieuNhap)}">
                            <td colspan="7">Chưa có phiếu nhập kho nào.</td>
                        </tr>
                        <tr th:each="phieu : ${danhSachPhieuNhap}">
                            <td th:text="${phieu.maPhieuNhap}"></td>
                            <td th:text="${#temporals.format(phieu.ngayNhap, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${phieu.tenNhanVien}"></td>
                            <td th:text="${phieu.ghiChu != null ? phieu.ghiChu : '---'}"></td>
                            <td th:text="${phieu.tongSoNguyenLieu}"></td>
                            <td th:text="${#numbers.formatDecimal(phieu.tongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td class="order-actions-col">
                                <div class="action-buttons">
                                    <a th:href="@{'/phieu-nhap-kho/' + ${phieu.maPhieuNhap}}" class="btn-secondary btn-small">Xem</a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
