<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/main :: page('Cập nhật thông tin cá nhân', ~{::content})">
    <div th:fragment="content">
        <section class="page-card form-card">
            <div class="page-head">
                <div>
                    <h2 class="section-title">Cập nhật thông tin cá nhân</h2>
                    <p class="section-subtitle">Chỉ cho phép chỉnh sửa họ tên, số điện thoại và địa chỉ.</p>
                </div>
                <a th:href="@{/ca-nhan}" class="btn-secondary">Quay lại</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{/ca-nhan/cap-nhat}" th:object="${capNhatCaNhan}" method="post" class="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Họ tên</label>
                        <input type="text" class="form-control" th:field="*{hoTen}" placeholder="Nhập họ tên">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{soDienThoai}" placeholder="Nhập số điện thoại">
                    </div>
                    <div class="form-group form-group--full">
                        <label class="form-label">Địa chỉ</label>
                        <textarea class="form-control" th:field="*{diaChi}" rows="4" placeholder="Nhập địa chỉ"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Lưu thay đổi</button>
                    <a th:href="@{/ca-nhan}" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</div>
</body>
</html>
