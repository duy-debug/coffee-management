<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Coffee Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/login.js}" defer></script>
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-card">
        <div class="login-hero">
            <div class="login-hero__overlay"></div>
            <div class="login-hero__content">
                <div class="login-brand">COFFEE HOÀNG TUẤN</div>
                <h1>Hệ thống quản lý quán cà phê</h1>
                <p>Đăng nhập để quản lý đơn hàng, sản phẩm, khách hàng và hệ thống.</p>

            </div>
        </div>

        <div class="login-panel">
            <div class="login-panel__inner">
                <div class="login-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 8h8v4a4 4 0 0 1-4 4H9a2 2 0 0 1-2-2V8Zm10 1h1.5A1.5 1.5 0 0 1 20 10.5v.2A3.3 3.3 0 0 1 16.7 14H16V9h1Zm-8.5 8.5h5a1 1 0 0 1 1 1V19h-7v-.5a1 1 0 0 1 1-1Z"></path>
                        <path d="M9 5.5c0 .8.6 1.1.6 2.1M12 4.8c0 .9.7 1.2.7 2.2M15 5.5c0 .8.6 1.1.6 2.1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
                    </svg>
                </div>

                <h2>Đăng nhập</h2>
                <p class="login-panel__subtitle">Chào mừng bạn quay trở lại!</p>

                <div class="alert alert-danger" th:if="${param.error}">
                    Tên đăng nhập hoặc mật khẩu không đúng, hoặc tài khoản đã bị khóa.
                </div>

                <div class="alert alert-success" th:if="${param.logout}">
                    Bạn đã đăng xuất thành công.
                </div>

                <form method="post" th:action="@{/login}" class="login-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="login-field">
                        <label for="tenDangNhap">Tên đăng nhập</label>
                        <div class="input-shell">
                            <span class="input-shell__icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" focusable="false">
                                    <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
                                </svg>
                            </span>
                            <input
                                    type="text"
                                    id="tenDangNhap"
                                    name="tenDangNhap"
                                    value="nhanvien4"
                                    placeholder="Nhập tên đăng nhập"
                                    autocomplete="username"
                                    required>
                        </div>
                    </div>

                    <div class="login-field">
                        <label for="matKhau">Mật khẩu</label>
                        <div class="input-shell">
                            <span class="input-shell__icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" focusable="false">
                                    <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6 8.73V18a1 1 0 0 1 2 0v-.27a2 2 0 1 1-2 0ZM15 9H9V7a3 3 0 0 1 6 0Z"></path>
                                </svg>
                            </span>
                            <input
                                    type="password"
                                    id="matKhau"
                                    name="matKhau"
                                    value="123456"
                                    placeholder="Nhập mật khẩu"
                                    autocomplete="current-password"
                                    required>
                            <button type="button" class="password-toggle" data-password-toggle aria-label="Hiện mật khẩu">
                                <svg class="password-toggle__icon password-toggle__icon--show" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 5c5.5 0 9.9 4.1 11 7-1.1 2.9-5.5 7-11 7S2.1 14.9 1 12c1.1-2.9 5.5-7 11-7Zm0 2C7.7 7 4 10.2 2.8 12 4 13.8 7.7 17 12 17s8-3.2 9.2-5C20 10.2 16.3 7 12 7Zm0 2.5A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5Z"></path>
                                </svg>
                                <svg class="password-toggle__icon password-toggle__icon--hide" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M2.8 4.1 20 21.3 18.6 22.7l-3-3A11.5 11.5 0 0 1 12 20C6.5 20 2.1 15.9 1 13c.7-2 2.8-4.8 6-6.6L1.3 4.7 2.8 4.1ZM12 8a4 4 0 0 1 4 4 3.9 3.9 0 0 1-.3 1.5l-1.5-1.5A2.4 2.4 0 0 0 12 10a2.5 2.5 0 0 0-2.5 2.5c0 .3 0 .5.1.8L8 11.7A4 4 0 0 1 12 8Zm0 8a4 4 0 0 1-4-4c0-.2 0-.4.1-.6l-2-2A9.8 9.8 0 0 0 12 16c2 0 4.4-.7 6.2-1.7l-1.5-1.5A4 4 0 0 1 12 16Z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="login-meta">
                        <label class="login-remember">
                            <input type="checkbox" name="remember-me">
                            <span>Ghi nhớ đăng nhập</span>
                        </label>
                    </div>

                    <button type="submit" class="login-button">
                        <span>Đăng nhập</span>
                        <svg class="login-button__arrow" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M13.2 5.6 19.6 12l-6.4 6.4-1.4-1.4 4-4H4v-2h11.8l-4-4 1.4-1.4Z"></path>
                        </svg>
                    </button>
                </form>

                <div class="login-footer">© 2024 Coffee Hoàng Tuấn. All rights reserved.</div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
