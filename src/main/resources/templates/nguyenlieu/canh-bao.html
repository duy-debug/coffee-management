<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/main :: page('Cảnh báo nguyên liệu', ~{::content})}">
    <div th:fragment="content">
        <section class="page-card">
            <div class="toolbar">
                <div>
                    <h2 class="section-title">Cảnh báo nguyên liệu</h2>
                    <p class="section-subtitle">Danh sách nguyên liệu có số lượng tồn thấp hơn hoặc bằng mức tối thiểu.</p>
                </div>
                <a th:href="@{/nguyen-lieu}" class="btn-secondary">Quay lại danh sách</a>
            </div>

            <div class="content-card" style="margin-bottom: 18px;">
                <form class="search-form" method="get" th:action="@{/nguyen-lieu/canh-bao}">
                    <div class="form-group">
                        <label class="form-label">Từ khóa</label>
                        <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Mã hoặc tên nguyên liệu">
                    </div>
                    <button type="submit" class="btn-primary btn-small">Lọc</button>
                    <a th:href="@{/nguyen-lieu/canh-bao}" class="btn-secondary btn-small">Làm mới</a>
                </form>
            </div>

            <div class="content-card">
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Mã NL</th>
                            <th>Tên nguyên liệu</th>
                            <th>Đơn vị tính</th>
                            <th>Số lượng tồn</th>
                            <th>Mức tối thiểu</th>
                            <th>Trạng thái</th>
                            <th class="order-actions-col">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSachNguyenLieu)}">
                            <td colspan="7">Không có nguyên liệu nào đang cảnh báo.</td>
                        </tr>
                        <tr th:each="nguyenLieu : ${danhSachNguyenLieu}">
                            <td th:text="${nguyenLieu.maNguyenLieu}"></td>
                            <td th:text="${nguyenLieu.tenNguyenLieu}"></td>
                            <td th:text="${nguyenLieu.donViTinh}"></td>
                            <td th:text="${nguyenLieu.soLuongTon}"></td>
                            <td th:text="${nguyenLieu.mucTonToiThieu}"></td>
                            <td>
                                <span class="badge-status badge-status--warning">Sắp hết</span>
                            </td>
                            <td class="order-actions-col">
                                <div class="action-buttons">
                                    <a th:href="@{'/nguyen-lieu/' + ${nguyenLieu.maNguyenLieu}}" class="btn-secondary btn-small">Xem</a>
                                    <a th:href="@{'/nguyen-lieu/sua/' + ${nguyenLieu.maNguyenLieu}}" class="btn-primary btn-small">Sửa</a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
